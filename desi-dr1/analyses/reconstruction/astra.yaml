version: "1.0"
name: Reconstruction

narrative:
  summary: |
    Density-field reconstruction for DESI DR1 parent samples — one
    pass per parent (BGS 0.1–0.4, LRGs 0.4–1.1, ELGs 0.8–1.6,
    QSO 0.8–2.1), emitting
    parent-level shifted galaxy + random catalogs. Per-z-bin slicing
    is deferred to [clustering](#../analyses.clustering), so the
    reconstruction solve sees the full parent redshift range; the
    shifted catalogs are then cut into tracer z-bins downstream at
    ξ-time.
  methods: |
    The displacement solve estimates Ψ from the Gaussian-smoothed
    raw density field and shifts both galaxies and randoms by −Ψ.
    Five knobs are exposed. The [algorithm](#decisions.algorithm) is
    IterativeFFT (fiducial, with MultiGrid as a sensitivity
    alternative); the Gaussian
    [smoothing_radius](#decisions.smoothing_radius) is inherited
    from the root so the BAO damping template downstream sees the
    same Σ_sm; [convention](#decisions.convention) is RecSym rather
    than the legacy RecIso, yielding simpler damping
    structure; [bias_input](#decisions.bias_input)
    takes a fixed per-parent value rather than a
    from-data estimate, since
    [Σ⊥/Σ∥ are set by bulk flows and only weakly by tracer
    bias](#../prior_insights.bias_weak_effect_on_sigma);
    [n_iterations](#decisions.n_iterations) defaults to 3 (pyrecon
    standard), with 1 and 5 retained as convergence checks.
  inputs: |
    Consumes the raw [DESI DR1 LSS catalogs](#inputs.desi_dr1_lss_catalogs)
    and the [tabulated DESI fiducial cosmology](#inputs.desi_fiducial_cosmology)
    for the redshift-to-distance conversion.
  outputs: |
    Emits a shifted galaxy + random catalog per parent sample —
    [BGS parent](#outputs.post_recon_catalog_bgs_full),
    [LRG parent](#outputs.post_recon_catalog_lrg_full),
    [ELG parent](#outputs.post_recon_catalog_elg_full), and
    [QSO parent](#outputs.post_recon_catalog_qso_full) — alongside
    diagnostic mean-displacement metrics
    ([BGS](#outputs.mean_displacement_bgs_full),
    [LRG](#outputs.mean_displacement_lrg_full),
    [ELG](#outputs.mean_displacement_elg_full),
    [QSO](#outputs.mean_displacement_qso_full)). Downstream slicing
    into per-tracer z-bins is done in [clustering](#../analyses.clustering).

    ![Mean |Ψ| for the LRG parent (Mpc/h)](#outputs.mean_displacement_lrg_full)

inputs:
  - id: desi_dr1_lss_catalogs
    type: data
    from: desi_dr1_lss_catalogs        # parent input (raw data + randoms, all tracers)

  - id: desi_fiducial_cosmology
    type: data
    from: desi_fiducial_cosmology      # parent input (z -> r table)

outputs:
  # --- BGS parent (z = 0.1 - 0.4) ---------------------------------------------
  - id: post_recon_catalog_bgs_full
    type: data
    description: |
      Shifted galaxy + random catalogs after reconstruction, BGS parent sample
      (z=0.1-0.4, BGS_BRIGHT-21.5). Same NPZ format as
      post_recon_catalog_lrg_full. The BGS tracer uses the full parent range
      (not sub-binned).
    decisions: [algorithm, convention, smoothing_radius, bias_input, n_iterations]
    recipe:
      command: >-
        python -u scripts/run_reconstruction.py --output {output} --parent bgs_full
        --algorithm {decisions.algorithm} --convention {decisions.convention}
        --smoothing_radius {decisions.smoothing_radius}
        --bias_input {decisions.bias_input} --n_iterations {decisions.n_iterations}
      resources: { cpus: 16, memory: "128GB", time_limit: "2h" }

  - id: mean_displacement_bgs_full
    type: metric
    description: "Mean |Psi| for BGS parent (Mpc/h)."
    decisions: [algorithm, convention, smoothing_radius, bias_input, n_iterations]
    recipe:
      command: >-
        python -u scripts/run_reconstruction.py --output {output} --parent bgs_full
        --algorithm {decisions.algorithm} --convention {decisions.convention}
        --smoothing_radius {decisions.smoothing_radius}
        --bias_input {decisions.bias_input} --n_iterations {decisions.n_iterations}
      resources: { cpus: 16, memory: "128GB", time_limit: "2h" }

  # --- LRG parent (z = 0.4 - 1.1) ---------------------------------------------
  - id: post_recon_catalog_lrg_full
    type: data
    description: |
      Shifted galaxy + random catalogs after reconstruction, LRG parent sample
      (z=0.4-1.1). NPZ with arrays: gal_pos, gal_pos_shift, gal_weights, gal_z,
      ran_pos, ran_pos_shift, ran_weights, ran_z (NGC+SGC concatenated;
      positions in Cartesian Mpc/h, DESI fiducial cosmology). Downstream xi
      computation slices by tracer z-range using gal_z / ran_z.
    decisions: [algorithm, convention, smoothing_radius, bias_input, n_iterations]
    recipe:
      command: >-
        python -u scripts/run_reconstruction.py --output {output} --parent lrg_full
        --algorithm {decisions.algorithm} --convention {decisions.convention}
        --smoothing_radius {decisions.smoothing_radius}
        --bias_input {decisions.bias_input} --n_iterations {decisions.n_iterations}
      resources: { cpus: 16, memory: "128GB", time_limit: "2h" }

  - id: mean_displacement_lrg_full
    type: metric
    description: "Mean |Psi| for LRG parent (Mpc/h). Typically 5-10 Mpc/h for LRGs."
    decisions: [algorithm, convention, smoothing_radius, bias_input, n_iterations]
    recipe:
      command: >-
        python -u scripts/run_reconstruction.py --output {output} --parent lrg_full
        --algorithm {decisions.algorithm} --convention {decisions.convention}
        --smoothing_radius {decisions.smoothing_radius}
        --bias_input {decisions.bias_input} --n_iterations {decisions.n_iterations}
      resources: { cpus: 16, memory: "128GB", time_limit: "2h" }

  # --- QSO parent (z = 0.8 - 2.1) ---------------------------------------------
  - id: post_recon_catalog_qso_full
    type: data
    description: |
      Shifted galaxy + random catalogs after reconstruction, QSO parent sample
      (z=0.8-2.1). Same NPZ format as post_recon_catalog_lrg_full. QSO uses
      Sigma_sm = 30 h^-1 Mpc rather than 15 h^-1 Mpc.
    decisions: [algorithm, convention, smoothing_radius_qso, bias_input, n_iterations]
    recipe:
      command: >-
        python -u scripts/run_reconstruction.py --output {output} --parent qso_full
        --algorithm {decisions.algorithm} --convention {decisions.convention}
        --smoothing_radius_qso {decisions.smoothing_radius_qso}
        --bias_input {decisions.bias_input} --n_iterations {decisions.n_iterations}
      resources: { cpus: 16, memory: "128GB", time_limit: "2h" }

  - id: mean_displacement_qso_full
    type: metric
    description: "Mean |Psi| for QSO parent (Mpc/h)."
    decisions: [algorithm, convention, smoothing_radius_qso, bias_input, n_iterations]
    recipe:
      command: >-
        python -u scripts/run_reconstruction.py --output {output} --parent qso_full
        --algorithm {decisions.algorithm} --convention {decisions.convention}
        --smoothing_radius_qso {decisions.smoothing_radius_qso}
        --bias_input {decisions.bias_input} --n_iterations {decisions.n_iterations}
      resources: { cpus: 16, memory: "128GB", time_limit: "2h" }

  # --- ELG parent (z = 0.8 - 1.6) ---------------------------------------------
  - id: post_recon_catalog_elg_full
    type: data
    description: |
      Shifted galaxy + random catalogs after reconstruction, ELG parent sample
      (z=0.8-1.6). Same format as post_recon_catalog_lrg_full. Sliced
      downstream into ELG1 (0.8-1.1) and (later) ELG2 (1.1-1.6).
    decisions: [algorithm, convention, smoothing_radius, bias_input, n_iterations]
    recipe:
      command: >-
        python -u scripts/run_reconstruction.py --output {output} --parent elg_full
        --algorithm {decisions.algorithm} --convention {decisions.convention}
        --smoothing_radius {decisions.smoothing_radius}
        --bias_input {decisions.bias_input} --n_iterations {decisions.n_iterations}
      resources: { cpus: 16, memory: "128GB", time_limit: "2h" }

  - id: mean_displacement_elg_full
    type: metric
    description: "Mean |Psi| for ELG parent (Mpc/h)."
    decisions: [algorithm, convention, smoothing_radius, bias_input, n_iterations]
    recipe:
      command: >-
        python -u scripts/run_reconstruction.py --output {output} --parent elg_full
        --algorithm {decisions.algorithm} --convention {decisions.convention}
        --smoothing_radius {decisions.smoothing_radius}
        --bias_input {decisions.bias_input} --n_iterations {decisions.n_iterations}
      resources: { cpus: 16, memory: "128GB", time_limit: "2h" }

decisions:

  algorithm:
    label: "Reconstruction algorithm"
    tags: [reconstruction, method]
    rationale: |
      Fiducial choice is IterativeFFT. MultiGrid is the main
      alternative; results are consistent (HOD-level).
    default: iterative_fft
    options:
      iterative_fft:
        label: "IterativeFFT (pyrecon)"
        description: "Iterative FFT-based reconstruction (fiducial)."
        insights:
          - recon_sharpens_bao_peak
          - nonlinear_peak_smearing
          - precision_loss_factor_three
          - recon_effective_at_low_z
          - factor_of_two_gain_at_z03
          - recon_factor_two_demonstrated
          - recon_easier_at_high_z
          - recon_improves_bao_by_2_to_3
          - recon_reduces_bao_damping
          - recon_less_damped_pl
          - recon_reduces_mode_coupling
      multigrid:
        label: "MultiGrid (pyrecon)"
        description: "Alternative; near-identical BAO scales."

  convention:
    label: "Reconstruction convention"
    tags: [reconstruction, method]
    rationale: |
      RecSym shifts both data and randoms by the redshift-space displacement
      (fiducial -- physically motivated, simpler BAO damping).
      RecIso is the legacy convention (data shifted by full
      displacement, randoms by real-space-only).
    default: recsym
    options:
      recsym:
        label: "RecSym"
        description: "Symmetric shifts of data + randoms (fiducial)."
        insights:
          - move_densities_not_particles
          - reference_grid_shifted_same
          - reconstructed_density_as_difference
      reciso:
        label: "RecIso"
        description: "Legacy convention; isotropic-only random shift."

  smoothing_radius:
    from: ../smoothing_radius       # inherited from the root (shared with BAO-fit scripts)

  smoothing_radius_qso:
    from: ../smoothing_radius_qso   # QSO-only fiducial (sm30)

  bias_input:
    label: "Linear bias used in reconstruction"
    tags: [reconstruction, method]
    rationale: |
      Reconstruction needs a galaxy bias to convert observed density into a
      matter displacement. Fiducial is a fixed value per parent sample;
      alternatively we can estimate b from the large-scale clustering of the
      data itself.
    default: fixed
    options:
      fixed:
        label: "Fixed"
        description: "Use the per-parent fiducial bias."
      estimated_from_data:
        label: "Estimated from data"
        description: "Fit b from the pre-recon P(k) at k < BIAS_KMAX."

  n_iterations:
    label: "Number of reconstruction iterations"
    tags: [reconstruction, method]
    rationale: |
      IterativeFFT iterates the displacement solve. 3 is the standard choice;
      results are robust beyond ~3 iterations.
    default: n3
    options:
      n1:
        label: "1 iteration"
        description: "Single solve; ZA-equivalent for IterativeFFT."
      n3:
        label: "3 iterations"
        description: "Standard choice (pyrecon default)."
      n5:
        label: "5 iterations"
        description: "Convergence check."

