        version: 2
        quote:
          exact: "rdrag [Mpc] . . . . . . . . . 147 .049 147 .09± 0.26 147 .26± 0.28 +0.6 147 .18± 0.29"
          prefix: "100θ∗"
          suffix: "15"
        location:
          page: 15

  planck2018_neutrino_convention:
    id: planck2018_neutrino_convention
    claim: "Planck 2018 base-ΛCDM assumes three neutrino species approximated as two massless and a single massive neutrino of mass m_ν = 0.06 eV; Ω_m includes this neutrino contribution."
    created_at: "2026-04-23T12:00:00"
    evidence:
      - id: ev1
        doi: "10.48550/arXiv.1807.06209"
        version: 2
        quote:
          exact: "We assume three neutrinos species, approximated as two massless states and a single massive neutrino of mass mν = 0.06 eV."
          prefix: "power-law spectrum."
          suffix: "We put ﬂat priors"
        location:
          page: 4
      - id: ev2
        doi: "10.48550/arXiv.1807.06209"
        version: 2
        quote:
          exact: "The Planck base-ΛCDM model assumes a normal mass hierarchy with the minimal mass ∑mν = 0.06 eV allowed by neutrino ﬂavour oscillatio"
          prefix: "base- ΛCDM value of mν = 0.06 eV"
          suffix: "ns"
        location:
          page: 47

  planck2018_neff_constraint:
    id: planck2018_neff_constraint
    claim: "Planck 2018 + BAO constrains N_eff = 2.99 ± 0.17, consistent with the Standard Model N_eff = 3.046 -- showing AbacusSummit c003 (N_eff = 3.70) is well outside the Planck preferred range."
    created_at: "2026-04-23T12:00:00"
    evidence:
      - id: ev1
        doi: "10.48550/arXiv.1807.06209"
        version: 2
        quote:
          exact: "Combining with baryon acoustic oscillation (BAO) measurements (and considering single-parameter extensions) we constrain the eﬀective extra relativistic degrees of freedom to beNeﬀ = 2.99±0.17, in agreement with the Standard Model prediction Neﬀ = 3.046, and ﬁnd that the neutrino mass is tightly constrained to ∑mν < 0.12 eV."
          prefix: "base-ΛCDM model."
          suffix: "The CMB spectra"
        location:
          page: 1

  # ==== Eisenstein, Seo, Sirko, Spergel 2007 (arXiv:astro-ph/0604362) -- seminal recon ====
  recon_sharpens_bao_peak:
    id: recon_sharpens_bao_peak
    claim: "Density-field reconstruction sharpens the acoustic peak in the correlation function (equivalently, restores higher harmonics in the power spectrum) -- the core motivation for applying reconstruction before BAO measurement."
    created_at: "2026-04-23T12:00:00"
    evidence:
      - id: ev1
        doi: "10.48550/arXiv.astro-ph/0604362"
        version: 2
        quote:
          exact: "By suitable reconstruction of the linear density field, one can sharpen the acoustic peak in the correlation function or, equivalently, restore the higher harmonics of the oscillations in the power spectrum."
          prefix: "the nonlinear degradation of the acoustic signature in the correlations of low-redshift galaxies is a correctable process."
          suffix: "With this, one can achieve better measurements of the acoustic scale"
        location:
          page: 1

  nonlinear_peak_smearing:
    id: nonlinear_peak_smearing
    claim: "Nonlinear structure formation and redshift-space distortions displace galaxies from their initial positions, blurring the BAO peak at ~150 Mpc and erasing higher harmonics in P(k)."
    created_at: "2026-04-23T12:00:00"
    evidence:
      - id: ev1
        doi: "10.48550/arXiv.astro-ph/0604362"
        version: 2
        quote:
          exact: "Non-linear gravitational structure formation and redshift distortions move galaxies away from their original locations, blurring out the peak at 150 Mpc separation, or, equivalently, erasing the higher harmonics in the power spectrum that represent smaller scales"
          prefix: "the acoustic signature in the correlation function is broadened by nonlinear effects."
          suffix: "Even though the baryon bump remains measurable"
        location:
          page: 1

  precision_loss_factor_three:
    id: precision_loss_factor_three
    claim: "Nonlinear smearing reduces the precision of the BAO distance scale achievable per unit survey volume by roughly a factor of three at the present day."
    created_at: "2026-04-23T12:00:00"
    evidence:
      - id: ev1
        doi: "10.48550/arXiv.astro-ph/0604362"
        version: 2
        quote:
          exact: "these nonlinear effects reduce the precision of the distance scale that can be measured from a given volume of space, by roughly a factor of three at the present day."
          prefix: "Even though the baryon bump remains measurable in the correlation function,"
          suffix: "This loss is significant because survey volume is precious"
        location:
          page: 1

  recon_effective_at_low_z:
    id: recon_effective_at_low_z
    claim: "Reconstruction is particularly effective at low redshift where nonlinearities are worst -- exactly the regime most sensitive to dark energy."
    created_at: "2026-04-23T12:00:00"
    evidence:
      - id: ev1
        doi: "10.48550/arXiv.astro-ph/0604362"
        version: 2
        quote:
          exact: "Reconstruction is particularly effective at low redshift, where the non-linearities are worse but where the dark energy density is highest."
          prefix: "better measurements of the acoustic scale for a given survey volume."
          suffix: "At z = 0.3, we find that one can reduce"
        location:
          page: 1

  factor_of_two_gain_at_z03:
    id: factor_of_two_gain_at_z03
    claim: "At z=0.3, reconstruction can reduce the sample-variance error bar on the acoustic scale by at least a factor of 2 and in principle nearly a factor of 4."
    created_at: "2026-04-23T12:00:00"
    evidence:
      - id: ev1
        doi: "10.48550/arXiv.astro-ph/0604362"
        version: 2
        quote:
          exact: "At z = 0.3, we find that one can reduce the sample variance error bar on the acoustic scale by at least a factor of 2 and in principle by nearly a factor of 4."
          prefix: "where the non-linearities are worse but where the dark energy density is highest."
          suffix: "We discuss the significant implications"
        location:
          page: 1

  recon_factor_two_demonstrated:
    id: recon_factor_two_demonstrated
    claim: "The simple linear-theory reconstruction in this paper improves distance precision from 1.4%/1.9% to 0.75%/0.95% in real/redshift space at z=0.3 -- the canonical factor-of-two gain."
    created_at: "2026-04-23T12:00:00"
    evidence:
      - id: ev1
        doi: "10.48550/arXiv.astro-ph/0604362"
        version: 2
        quote:
          exact: "The simple reconstruction presented in this section improves these measurements to 0.75% and 0.95% in real and redshift space, respectively. This is a factor of two improvement."
          prefix: "a survey of 1 h-3 Gpc3 should produce a distance measurement of 1.4% from real space and 1.9% from redshift space."
          suffix: "We find that if the reconstruction were perfect"
        location:
          page: 4

  move_densities_not_particles:
    id: move_densities_not_particles
    claim: "The conceptual basis of reconstruction is to move measured densities (not all particles) back to their initial location -- established by shifting a reference grid of smoothly distributed particles alongside the real particles and differencing the densities."
    created_at: "2026-04-23T12:00:00"
    evidence:
      - id: ev1
        doi: "10.48550/arXiv.astro-ph/0604362"
        version: 2
        quote:
          exact: "Note that, in contrast to the work of Sirko &amp; Spergel (2006), the point is not to move all of the particles back to their initial location, but rather to move the measured densities back to their initial location."
          prefix: "A new density field is defined by the difference of the density field of the real particles and that of the reference particles."
          suffix: "The power spectrum of this field"
        location:
          page: 2
    scope: "RecSym convention basis"

  reference_grid_shifted_same:
    id: reference_grid_shifted_same
    claim: "The seminal recon algorithm shifts a reference grid of smoothly distributed particles (i.e., randoms) by the same displacement field as the real particles -- the operational prescription behind RecSym."
    created_at: "2026-04-23T12:00:00"
    evidence:
      - id: ev1
        doi: "10.48550/arXiv.astro-ph/0604362"
        version: 2
        quote:
          exact: "We do the same for a reference grid of smoothly distributed particles."
          prefix: "We then move the particles by -q."
          suffix: "In redshift space, we account for the linear redshift distortions"
        location:
          page: 2
    scope: "RecSym convention"

  reconstructed_density_as_difference:
    id: reconstructed_density_as_difference
    claim: "The reconstructed density field is defined as the difference between the shifted real-particle density and the shifted reference-particle density -- the symmetric convention that displaces both tracers and randoms."
    created_at: "2026-04-23T12:00:00"
    evidence:
      - id: ev1
        doi: "10.48550/arXiv.astro-ph/0604362"
        version: 2
        quote:
          exact: "A new density field is defined by the difference of the density field of the real particles and that of the reference particles."
          prefix: "boosting the displacements along the line of sight by an additional factor of 1 + f"
          suffix: "Note that, in contrast to the work of Sirko &amp; Spergel"
        location:
          page: 2
    scope: "RecSym convention"

  recon_easier_at_high_z:
    id: recon_easier_at_high_z
    claim: "Reconstruction is easier at higher redshifts because raw displacements are smaller there -- corollary: reconstruction is most needed, and provides the largest gains, at low redshift."
    created_at: "2026-04-23T12:00:00"
    evidence:
      - id: ev1
        doi: "10.48550/arXiv.astro-ph/0604362"
        version: 2
        quote:
          exact: "Thus, reconstruction is easier at higher redshifts: the raw displacements are smaller, so one can accomplish sufficient reconstruction using only larger scales."
          prefix: "Once we reduce the errors below this characteristic width, there is little improvement in the acoustic oscillations measurements."
          suffix: "Even at z = 3, it is likely that reconstruction will benefit"
        location:
          page: 4

  recon_improves_bao_by_2_to_3:
    id: recon_improves_bao_by_2_to_3
    claim: "Overall conclusion: density-field reconstruction offers a factor-of-2-to-3 improvement to the BAO method, particularly at lower redshifts."
    created_at: "2026-04-23T12:00:00"
    evidence:
      - id: ev1
        doi: "10.48550/arXiv.astro-ph/0604362"
        version: 2
        quote:
          exact: "density-field reconstruction offers a significant opportunity to improve the baryon acoustic peak method by a factor of 2 to 3, particularly at lower redshifts."
          prefix: "In conclusion, we believe that"
          suffix: "We thank Martin White for useful conversations."
        location:
          page: 5

  # ==== Padmanabhan, White, Cohn 2009 (arXiv:0812.2905) -- LPT reconstruction ====
  recon_reduces_bao_damping:
    id: recon_reduces_bao_damping
    claim: "Reconstruction reduces the non-linear damping of the BAO oscillations by about a factor of two when the input density field is smoothed on the non-linear scale."
    created_at: "2026-04-23T12:00:00"
    evidence:
      - id: ev1
        doi: "10.48550/arXiv.0812.2905"
        version: 2
        quote:
          exact: "Reconstruction does reduce the damping of the oscillations, by about a factor of 2 when the input density field is smoothed on the non-linear scale."
          prefix: "independent of assumptions about the smoothing of the initial density field."
          suffix: "(iii) Reconstruction also reduces the mode coupling terms"
        location:
          page: 6

  recon_less_damped_pl:
    id: recon_less_damped_pl
    claim: "Within the Lagrangian/Zel'dovich framework, the linear-power-spectrum contribution to the reconstructed power spectrum is less damped than in the non-linear power spectrum -- the core theoretical reason reconstruction sharpens the BAO peak."
    created_at: "2026-04-23T12:00:00"
    evidence:
      - id: ev1
        doi: "10.48550/arXiv.0812.2905"
        version: 2
        quote:
          exact: "This is the crux of the reconstruction method - that the PL contribution to the reconstructed power spectrum is less damped than in the nonlinear power spectrum."
          prefix: "both Σss and Σdd (and therefore Σsd as well) are less than the nonlinear damping scale."
          suffix: "This holds even when taking into account"
        location:
          page: 4

  recon_reduces_mode_coupling:
    id: recon_reduces_mode_coupling
    claim: "Reconstruction also reduces the mode-coupling terms that introduce out-of-phase oscillation components and shift the acoustic peak -- complementary to the damping-reduction motivation."
    created_at: "2026-04-23T12:00:00"
    evidence:
      - id: ev1
        doi: "10.48550/arXiv.0812.2905"
        version: 2
        quote:
          exact: "Reconstruction also reduces the mode coupling terms which introduce an out of phase component of the oscillations or shift the peak."
          prefix: "when the input density field is smoothed on the non-linear scale."
          suffix: "(iv) The reconstructed power spectrum is the sum of three power spectra"
        location:
          page: 6

# -----------------------------------------------------------------------------
# Findings -- claims derived from this analysis's own artifacts. Mirror of
# `prior_insights` but with `artifact:` evidence instead of `doi:` (see
# .claude/guides/prism-reference.md). Populated from the `baseline` universe
# and pinned to the CSV/plot outputs that support each claim.
# -----------------------------------------------------------------------------
findings:

  bao_peak_sharpens_post_recon:
    id: bao_peak_sharpens_post_recon
    label: "BAO peak sharpens"
    claim: "The BAO feature in ξ(s) visibly sharpens from pre- to post-reconstruction across tracers."
    notes: |
      The isolated-feature curves show a narrower, taller peak near
      100 Mpc/h post-recon than pre-recon, consistent with
      displacement-field reconstruction undoing the non-linear bulk
      flows that smear the acoustic signature.
    created_at: "2026-04-23T12:00:00"
    evidence:
      - id: ev1
        artifact: bao_fit_plot
        quote:
          exact: "Isolated BAO feature + best-fit xi model, pre vs post, one row per tracer; post-recon curves show a sharper peak."
    scope: "LRG1/LRG2/LRG3/ELG1/ELG2/LRG3+ELG1, baseline universe."

  bao_detected_post_recon:
    id: bao_detected_post_recon
    label: "BAO detected post-recon"
    claim: "The acoustic feature is detected post-reconstruction in every tracer."
    notes: |
      Δχ²(α_iso) profiles comparing the damped-BAO template to a
      no-BAO reference show a well-defined minimum near α_iso ≈ 1
      in each case.
    created_at: "2026-04-23T12:00:00"
    evidence:
      - id: ev1
        artifact: bao_detection_plot
        quote:
          exact: "Δχ²(α_iso) vs α_iso per tracer, BAO template vs no-BAO; per-tracer minimum quantifies detection significance."
    scope: "LRG1, LRG2, LRG3, ELG1, ELG2, LRG3+ELG1 — post-reconstruction, baseline universe."

  recon_reduces_alpha_iso_sigma:
    id: recon_reduces_alpha_iso_sigma
    label: "Reconstruction tightens α_iso"
    claim: "Reconstruction shrinks σ(α_iso) across every fitted tracer."
    notes: |
      σ(α_iso) falls by a factor of ~1.4–1.8 across the 2D-fit tracers
      (LRG1 0.0167 → 0.0114, LRG2 0.0198 → 0.0113, LRG3 0.0131 →
      0.0093) and by ~2.9× for the 1D ELG1 fit (0.0772 → 0.0266).
    created_at: "2026-04-23T12:00:00"
    evidence:
      - id: ev1
        artifact: bao_alpha_values
        quote:
          exact: "lrg1,Pre,chain,qiso,0.9709,0.0167 ... lrg1,Post,chain,qiso,0.9776,0.0114 ... lrg2,Pre,qiso,0.9396,0.0198 ... lrg2,Post,qiso,0.9558,0.0113 ... lrg3,Pre,qiso,1.0039,0.0131 ... lrg3,Post,qiso,1.0001,0.0093 ... elg1,Pre,qiso,1.0075,0.0772 ... elg1,Post,qiso,0.9892,0.0266"
    scope: "LRG1/LRG2/LRG3/ELG1 under the baseline universe."

  subpercent_alpha_iso_precision:
    id: subpercent_alpha_iso_precision
    label: "~1 % α_iso precision"
    claim: "Post-recon α_iso is measured at roughly 1 % fractional precision per 2D LRG bin."
    notes: |
      σ(α_iso)/α_iso = 1.17 % for LRG1, 1.18 % for LRG2, and 0.93 %
      for LRG3 — placing the BAO scale at these redshifts to
      sub-percent in the best case.
    created_at: "2026-04-23T12:00:00"
    evidence:
      - id: ev1
        artifact: bao_alpha_values
        quote:
          exact: "lrg1,Post,chain,qiso,0.9776,0.0114 ; lrg2,Post,chain,qiso,0.9558,0.0113 ; lrg3,Post,chain,qiso,1.0001,0.0093"
    scope: "LRG1/LRG2/LRG3 post-recon iso_AP fits, baseline universe."

  bao_fit_chi2_near_dof:
    id: bao_fit_chi2_near_dof
    label: "χ²/dof near dof"
    claim: "Post-recon fits return χ²/dof consistent with the number of degrees of freedom."
    notes: |
      Per-tracer values: LRG1 38.1/39, LRG2 36.5/39, LRG3 27.5/39,
      ELG1 20.4/19. The damped-BAO template plus spline broadband
      adequately describes the measured correlation functions over
      the fit range.
    created_at: "2026-04-23T12:00:00"
    evidence:
      - id: ev1
        artifact: bao_alpha_values
        quote:
          exact: "lrg1,Post,...,38.0902,39 ; lrg2,Post,...,36.5192,39 ; lrg3,Post,...,27.4651,39 ; elg1,Post,...,20.4308,19"
    scope: "Post-recon iso_AP fits, baseline universe."

# -----------------------------------------------------------------------------
# Sub-analyses (external -- each has its own astra.yaml under analyses/<name>/)
# -----------------------------------------------------------------------------
analyses:

  # Stage 1: Density-field reconstruction
  reconstruction:
    path: ./analyses/reconstruction

  # Stage 2: Two-point clustering measurement
  # Note: covariance is pre-computed from DESI VAC (RascalC) and ingested as a
  # top-level input -- not produced here.
  clustering:
    path: ./analyses/clustering

# -----------------------------------------------------------------------------
# Main analysis (this file's root) handles BAO fitting + tracer combination
# + Hubble diagram. Decisions like broadband model, 1D vs 2D fits, priors,
# fiducial cosmology live in top-level `decisions:` above.
# -----------------------------------------------------------------------------
