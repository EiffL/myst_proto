  # ==== Planck Collaboration 2018 VI (arXiv:1807.06209) -- base-ΛCDM parameters ====
  planck2018_headline_parameters:
    id: planck2018_headline_parameters
    claim: "Planck 2018 TT,TE,EE+lowE+lensing base-ΛCDM gives Ω_b h² = 0.02237, Ω_c h² = 0.1200, n_s = 0.9649, H0 = 67.36 km/s/Mpc, Ω_m = 0.3153 -- the values adopted as AbacusSummit c000."
