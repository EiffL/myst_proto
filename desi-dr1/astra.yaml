  planck2018_rdrag_precision:
    id: planck2018_rdrag_precision
    claim: "Planck 2018 base-ΛCDM constrains the sound horizon at the drag epoch to r_drag = 147.09 ± 0.26 Mpc, the CMB anchor for the BAO standard ruler."
    created_at: "2026-04-23T12:00:00"
