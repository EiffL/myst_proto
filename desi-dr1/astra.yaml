# ASTRA Analysis Specification
# Documentation: https://github.com/LightconeResearch/ASTRA

version: "1.0"
name: DESI DR1 BAO Analysis
authors:
  - DESI Collaboration
tags:
  - cosmology
  - bao
  - desi
narrative:
  summary: |
    Reproduction of the DESI DR1 configuration-space BAO measurement
    across all eight tracer-redshift bins: BGS (0.1 < z < 0.4),
    LRG1 / LRG2 / LRG3 (0.4 < z < 1.1), ELG1 / ELG2
    (0.8 < z < 1.6), the combined LRG3+ELG1 bin, and
    QSO (0.8 < z < 2.1). Damped-BAO fits to ξ(s) pre- and
    post-reconstruction in the α_iso/α_AP basis (α_iso-only for the
    1D-fit tracers BGS, ELG1, QSO); the α_⊥/α_∥ basis is derived from
    the same iso_ap chains via the qper/qpar derived parameters
    rather than separately sampled, since basis-Jacobian effects are
    negligible at our precision. Fourier-space P(k) is out of scope.

    The baseline universe delivers sub-percent α_iso precision per
    2D LRG bin post-recon, with σ(α_iso) and σ(α_AP) consistent
    across the 16 chains, and produces propagated D_M/r_d, D_H/r_d,
    D_V/r_d distances at ~1 % per tracer. The same chains feed the
    Hubble diagram against 6dFGS / WiggleZ / SDSS DR16 / DES Y6.

    ![Hubble diagram against 6dFGS / WiggleZ / SDSS DR16 / DES Y6](#outputs.hubble_diagram_plot)
  findings: |
    [The ξ(s) BAO feature sharpens from pre to post-reconstruction
    across tracers](#findings.bao_peak_sharpens_post_recon), and
    [a Δχ²(α_iso) minimum against a no-BAO reference is detected in
    every post-recon tracer](#findings.bao_detected_post_recon). The
    isolated BAO feature per tracer and the Δχ²(α_iso) detection
    profiles are the headline visual signatures of the measurement.

    ![Isolated BAO feature per tracer](#outputs.bao_fit_plot)

    ![Δχ²(α_iso) BAO-vs-no-BAO detection profiles](#outputs.bao_detection_plot)

    Statistically, [reconstruction contracts σ(α_iso) by ~1.4–3×
    depending on tracer](#findings.recon_reduces_alpha_iso_sigma) —
    the LPT-predicted [reduction of non-linear BAO damping under
    reconstruction](#prior_insights.recon_reduces_bao_damping) — and
    yields [sub-percent α_iso per 2D LRG bin
    post-recon](#findings.subpercent_alpha_iso_precision). The
    aggregated α values
    ([α_iso / α_AP](#outputs.bao_alpha_values) and
    [α_⊥ / α_∥](#outputs.bao_alpha_perp_par)) and the post-recon
    distance constraints D_M/r_d, D_H/r_d, D_V/r_d, D_M/D_H with the
    combined modelling + HOD + fiducial-cosmology systematic budget
    folded in are the primary numerical deliverables.

    ![Final BAO distance constraints](#outputs.bao_distance_table)

    [χ²/dof lands near dof in every fit](#findings.bao_fit_chi2_near_dof).
    The combined modelling + HOD + fiducial-cosmology systematic
    budget is folded in at the aggregation step without a refit;
    [systematic_error_treatment](#decisions.systematic_error_treatment)
    toggles between stat-only and with-budget views as a table
    rebuild rather than a refit.
  inputs: |
    Three input classes drive the pipeline. Raw
    [DESI DR1 LSS clustering catalogs](#inputs.desi_dr1_lss_catalogs)
    (galaxies + 18 random realisations per cap) feed pre-recon ξ
    and reconstruction. The
    [tabulated DESI fiducial cosmology](#inputs.desi_fiducial_cosmology)
    supplies z → r(z) — the table must match DESI's TabulatedDESI
    convention exactly or the window and covariance stop being
    self-consistent. The **RascalC analytic covariances** — one pre-
    and one post-recon file per tracer (including LRG3+ELG1), from
    the DESI unblinded v1.2 release — are ingested as-is rather than
    recomputed, fixing ξ s-binning at 4 Mpc/h over 0–200 Mpc/h.

    Choosing the published RascalC matrices via
    [covariance_source](#decisions.covariance_source) = `desi_vac`
    is the load-bearing input decision: the `self_computed`
    alternative is declared and explicitly excluded (~20 node-days
    of compute + private `desi_y1_files` dep; see `excluded_reason`),
    so the alternative is documented rather than silently absent.
    Because RascalC is calibrated against a fixed fiducial
    reconstruction + clustering setup, this choice constrains the
    downstream recon pipeline to its fiducial options (see Methods).
  methods: |
    [Reconstruction](#analyses.reconstruction) runs first: the linear
    displacement field is estimated from the Gaussian-smoothed raw
    density and applied symmetrically to galaxies and randoms
    (RecSym), sharpening the BAO peak. One pass per parent sample
    (LRG 0.4–1.1, ELG 0.8–1.6) emits shifted catalogs. The
    load-bearing knob enters here —
    [smoothing_radius](#decisions.smoothing_radius) sets the Σ_sm
    applied before solving for the displacement, and because the
    same Σ_sm enters the BAO model's damping correction downstream,
    reconstruction inherits it from the root via
    `from: ../smoothing_radius` to keep the two stages consistent.

    [Clustering](#analyses.clustering) measures the Landy–Szalay
    ξ(s, μ) on raw and shifted catalogs per tracer z-slice. Because
    the ξ(s) covariance is pinned to the published RascalC matrices
    rather than recomputed (see Data), non-fiducial
    [smoothing_radius](#decisions.smoothing_radius) (sm10 / sm20)
    and [smoothing_radius_qso](#decisions.smoothing_radius_qso) (sm20)
    declare `incompatible_with: [covariance_source.desi_vac]`, so
    the baseline universe validates only when those stay at
    fiducial. The non-fiducial reconstruction options
    (MultiGrid, RecIso, estimated-from-data bias, n1 / n5 iterations)
    are similarly only valid against a self-computed covariance, but
    that lock is documented in `covariance_source`'s rationale rather
    than enforced via cross-sub `incompatible_with`. Clustering's
    s-binning, μ-binning, and estimator are locked to the RascalC
    grid for the same reason, which is why
    [clustering](#analyses.clustering) carries no binning decisions —
    only an `imaging_weights` on/off toggle, which the same cov
    null-tests at 0.27 σ and is therefore left unlocked.

    The root stage fits the fiducial damped-BAO template with
    desilike + emcee, producing one MCMC chain per (tracer, recon
    state). The 5 2D tracers (LRG1/LRG2/LRG3, LRG3+ELG1, ELG2) get
    two `iso_ap` chains each (pre + post); the 3 1D-only tracers
    (BGS, ELG1, QSO) get two `iso` chains each — 16 chains in total.
    The `iso_ap` chains carry qper / qpar / DM_over_rd / DH_over_rd /
    DV_over_rd / DH_over_DM as derived parameters, so a single
    sampling pass per (tracer, recon) feeds the α-table, the
    perp/par-basis table, the distance constraints, and the BAO,
    detection-profile, distance-corner, and Hubble-diagram figures
    with no separate `perp_par`-basis sampling needed.

    ![4×4 distance posterior corner with α-residual top inset](#outputs.distance_residuals_plot)

    Three template-shape knobs are exposed as decisions so
    alternatives can be layered on without spec drift, each pinned
    to its fiducial:
    [FoG damping on the smooth component only](#decisions.fog_placement),
    [α dilation on wiggles only](#decisions.dilate_model_component),
    and [peak-average dewiggling](#decisions.dewiggling_method). Only
    the fiducial branch of each is wired — the alternatives are
    declared to document the modelling-systematic budget they
    underlie. The main systematics dial at the fit stage is
    [broadband](#decisions.broadband) (spline fiducial vs polynomial
    legacy form), which [has been validated as giving consistent
    α's with the residual absorbed into the modelling error
    budget](#prior_insights.spline_broadband_fiducial). BAO damping
    is set jointly by [damping_prior](#decisions.damping_prior) and
    [damping_centers](#decisions.damping_centers), anchored to the
    finding that [mis-centring by ≳ 2 h⁻¹ Mpc biases α at the
    0.1–0.2 % level](#prior_insights.damping_prior_width_justification).
    Fiducial-cosmology systematics are swept via
    [template_cosmology](#decisions.template_cosmology) (five
    AbacusSummit grids, `c000` = Planck 2018 default). The remaining
    decisions ([fit_range](#decisions.fit_range),
    [ells](#decisions.ells),
    [fitting_method](#decisions.fitting_method)) exist for
    sensitivity tests.
  outputs: |
    The deliverables fall into three groups. The MCMC chains are
    the primitives: one per (tracer, recon state) — 16 in total —
    in `iso_ap` form for the 5 2D tracers and `iso` form for the
    3 1D tracers. The aggregated tables condense those chains into
    [α_iso / α_AP](#outputs.bao_alpha_values),
    [α_⊥ / α_∥](#outputs.bao_alpha_perp_par), and the post-recon
    [distance constraints D_M/r_d, D_H/r_d, D_V/r_d, D_M/D_H](#outputs.bao_distance_table)
    with the modelling + HOD + fiducial-cosmology systematic budget
    folded in at the aggregation step (toggled by
    [systematic_error_treatment](#decisions.systematic_error_treatment)
    as a table rebuild rather than a refit). The figures are the
    headline visuals: per-tracer
    [isolated BAO feature](#outputs.bao_fit_plot) and
    [Δχ²(α_iso) detection profile](#outputs.bao_detection_plot)
    panels, the
    [distance posterior corner](#outputs.distance_residuals_plot),
    and the
    [Hubble diagram against 6dFGS / WiggleZ / SDSS DR16 / DES Y6](#outputs.hubble_diagram_plot).

# Containerization skipped on NERSC: mpi4py + podman-hpc is fiddly and the
# project's .venv already isolates deps. Add `container:` back if you want to
# reproduce off-cluster.

# -----------------------------------------------------------------------------
# Top-level inputs (shared across sub-analyses + main fit)
# -----------------------------------------------------------------------------
inputs:
  - id: desi_dr1_lss_catalogs
    type: data
    description: |
      DESI DR1 iron v1.5 LSS clustering catalogs (data + 18 randoms per cap).
      Used by reconstruction (raw catalogs) and clustering (pre-recon xi).
      All tracers live here -- LRG_{NGC,SGC}_clustering.{dat,ran_i}.fits,
      ELG_LOPnotqso_*, QSO_*.
    source: "/global/cfs/cdirs/desi/public/dr1/survey/catalogs/dr1/LSS/iron/LSScats/v1.5/"

  - id: desi_fiducial_cosmology
    type: data
    description: |
      Tabulated z -> r(z) for the DESI fiducial cosmology
      (AbacusSummit c000, Planck 2018 LCDM, Omega_m=0.3153, h=0.6736).
      Must be used for redshift -> distance conversion to match DESI's
      pkrun.py / TabulatedDESI; otherwise window/covariance get inflated.
    source: "data/desi_fiducial_cosmology.dat"

  # --- BGS covariance ---
  - id: desi_rascalc_cov_bgs
    type: data
    description: |
      DESI RascalC analytic covariance for BGS_BRIGHT-21.5, GCcomb, z=0.1-0.4,
      post-recon (IFFT recsym, sm15). Consumed by the BGS post-recon BAO fit
      (1D monopole fit; ~4σ detection).
    source: "/global/cfs/cdirs/desi/users/mrash/RascalC/Y1/unblinded/v1.2/xi024_BGS_BRIGHT-21.5_IFFT_recsym_sm15_GCcomb_0.1_0.4_default_FKP_lin4_s20-200_cov_RascalC_rescaled.txt"

  - id: desi_rascalc_cov_bgs_pre
    type: data
    description: |
      DESI RascalC analytic covariance for BGS_BRIGHT-21.5, GCcomb, z=0.1-0.4,
      PRE-recon. Used for the BGS pre-reconstruction BAO fit.
    source: "/global/cfs/cdirs/desi/users/mrash/RascalC/Y1/unblinded/v1.2/xi024_BGS_BRIGHT-21.5_GCcomb_0.1_0.4_default_FKP_lin4_s20-200_cov_RascalC_rescaled.txt"

  # --- LRG1 covariance ---
  - id: desi_rascalc_cov_lrg1
    type: data
    description: |
      DESI pre-computed RascalC analytic covariance for LRG, GCcomb,
      z=0.4-0.6, post-recon (IFFT recsym, sm15), default+FKP weights,
      lin4 binning, s=20-200 Mpc/h. ASCII matrix.
    source: "/global/cfs/cdirs/desi/users/mrash/RascalC/Y1/unblinded/v1.2/xi024_LRG_IFFT_recsym_sm15_GCcomb_0.4_0.6_default_FKP_lin4_s20-200_cov_RascalC_rescaled.txt"

  - id: desi_rascalc_cov_lrg1_pre
    type: data
    description: |
      DESI pre-computed RascalC analytic covariance for LRG, GCcomb,
      z=0.4-0.6, PRE-recon, default+FKP weights, lin4 binning, s=20-200 Mpc/h.
      Used for the pre-reconstruction BAO fit.
    source: "/global/cfs/cdirs/desi/users/mrash/RascalC/Y1/unblinded/v1.2/xi024_LRG_GCcomb_0.4_0.6_default_FKP_lin4_s20-200_cov_RascalC_rescaled.txt"

  # --- LRG2 covariance ---
  - id: desi_rascalc_cov_lrg2
    type: data
    description: |
      DESI pre-computed RascalC analytic covariance for LRG, GCcomb,
      z=0.6-0.8, post-recon (IFFT recsym, sm15). Same format as
      desi_rascalc_cov_lrg1.
    source: "/global/cfs/cdirs/desi/users/mrash/RascalC/Y1/unblinded/v1.2/xi024_LRG_IFFT_recsym_sm15_GCcomb_0.6_0.8_default_FKP_lin4_s20-200_cov_RascalC_rescaled.txt"

  - id: desi_rascalc_cov_lrg2_pre
    type: data
    description: |
      DESI pre-computed RascalC analytic covariance for LRG, GCcomb,
      z=0.6-0.8, PRE-recon. Used for the pre-reconstruction BAO fit.
    source: "/global/cfs/cdirs/desi/users/mrash/RascalC/Y1/unblinded/v1.2/xi024_LRG_GCcomb_0.6_0.8_default_FKP_lin4_s20-200_cov_RascalC_rescaled.txt"

  # --- LRG3 covariance ---
  - id: desi_rascalc_cov_lrg3
    type: data
    description: |
      DESI RascalC analytic covariance for LRG, GCcomb, z=0.8-1.1, post-recon
      (IFFT recsym, sm15). Consumed by the LRG3 post-recon BAO fit.
    source: "/global/cfs/cdirs/desi/users/mrash/RascalC/Y1/unblinded/v1.2/xi024_LRG_IFFT_recsym_sm15_GCcomb_0.8_1.1_default_FKP_lin4_s20-200_cov_RascalC_rescaled.txt"

  - id: desi_rascalc_cov_lrg3_pre
    type: data
    description: |
      DESI RascalC analytic covariance for LRG, GCcomb, z=0.8-1.1, PRE-recon.
      Used for the LRG3 pre-reconstruction BAO fit.
    source: "/global/cfs/cdirs/desi/users/mrash/RascalC/Y1/unblinded/v1.2/xi024_LRG_GCcomb_0.8_1.1_default_FKP_lin4_s20-200_cov_RascalC_rescaled.txt"

  # --- ELG1 covariance ---
  - id: desi_rascalc_cov_elg1
    type: data
    description: |
      DESI RascalC analytic covariance for ELG_LOPnotqso, GCcomb, z=0.8-1.1,
      post-recon (IFFT recsym, sm15). Consumed by the ELG1 post-recon BAO fit
      (1D monopole fit).
    source: "/global/cfs/cdirs/desi/users/mrash/RascalC/Y1/unblinded/v1.2/xi024_ELG_LOPnotqso_IFFT_recsym_sm15_GCcomb_0.8_1.1_default_FKP_lin4_s20-200_cov_RascalC_rescaled.txt"

  - id: desi_rascalc_cov_elg1_pre
    type: data
    description: |
      DESI RascalC analytic covariance for ELG_LOPnotqso, GCcomb, z=0.8-1.1,
      PRE-recon. Used for the ELG1 pre-reconstruction BAO fit.
    source: "/global/cfs/cdirs/desi/users/mrash/RascalC/Y1/unblinded/v1.2/xi024_ELG_LOPnotqso_GCcomb_0.8_1.1_default_FKP_lin4_s20-200_cov_RascalC_rescaled.txt"

  # --- ELG2 covariance ---
  - id: desi_rascalc_cov_elg2
    type: data
    description: |
      DESI RascalC analytic covariance for ELG_LOPnotqso, GCcomb, z=1.1-1.6,
      post-recon (IFFT recsym, sm15). Consumed by the ELG2 post-recon BAO fit
      (2D monopole + quadrupole).
    source: "/global/cfs/cdirs/desi/users/mrash/RascalC/Y1/unblinded/v1.2/xi024_ELG_LOPnotqso_IFFT_recsym_sm15_GCcomb_1.1_1.6_default_FKP_lin4_s20-200_cov_RascalC_rescaled.txt"

  - id: desi_rascalc_cov_elg2_pre
    type: data
    description: |
      DESI RascalC analytic covariance for ELG_LOPnotqso, GCcomb, z=1.1-1.6,
      PRE-recon. Used for the ELG2 pre-reconstruction BAO fit.
    source: "/global/cfs/cdirs/desi/users/mrash/RascalC/Y1/unblinded/v1.2/xi024_ELG_LOPnotqso_GCcomb_1.1_1.6_default_FKP_lin4_s20-200_cov_RascalC_rescaled.txt"

  # --- LRG3 + ELG1 combined covariance ---
  - id: desi_rascalc_cov_lrg3_elg1
    type: data
    description: |
      DESI RascalC analytic covariance for the LRG+ELG_LOPnotqso combined
      tracer, GCcomb, z=0.8-1.1, post-recon (IFFT recsym, sm15). Consumed
      by the LRG3+ELG1 combined-tracer fit (headline row).
    source: "/global/cfs/cdirs/desi/users/mrash/RascalC/Y1/unblinded/v1.2/xi024_LRG+ELG_LOPnotqso_IFFT_recsym_sm15_GCcomb_0.8_1.1_default_FKP_lin4_s20-200_cov_RascalC_rescaled.txt"

  # --- QSO covariance (sm30 post-recon) ---
  - id: desi_rascalc_cov_qso
    type: data
    description: |
      DESI RascalC analytic covariance for QSO, GCcomb, z=0.8-2.1,
      post-recon (IFFT recsym, sm30 — fiducial smoothing for QSO).
      Consumed by the QSO post-recon BAO fit (1D monopole fit;
      ~4.2σ detection).
    source: "/global/cfs/cdirs/desi/users/mrash/RascalC/Y1/unblinded/v1.2/xi024_QSO_IFFT_recsym_sm30_GCcomb_0.8_2.1_default_FKP_lin4_s20-200_cov_RascalC_rescaled.txt"

  - id: desi_rascalc_cov_qso_pre
    type: data
    description: |
      DESI RascalC analytic covariance for QSO, GCcomb, z=0.8-2.1,
      PRE-recon. Used for the QSO pre-reconstruction BAO fit.
    source: "/global/cfs/cdirs/desi/users/mrash/RascalC/Y1/unblinded/v1.2/xi024_QSO_GCcomb_0.8_2.1_default_FKP_lin4_s20-200_cov_RascalC_rescaled.txt"

  - id: desi_rascalc_cov_lrg3_elg1_pre
    type: data
    description: |
      DESI RascalC analytic covariance for the LRG+ELG_LOPnotqso combined
      tracer, GCcomb, z=0.8-1.1, PRE-recon. Used for the combined-tracer
      pre-reconstruction BAO fit.
    source: "/global/cfs/cdirs/desi/users/mrash/RascalC/Y1/unblinded/v1.2/xi024_LRG+ELG_LOPnotqso_GCcomb_0.8_1.1_default_FKP_lin4_s20-200_cov_RascalC_rescaled.txt"


# -----------------------------------------------------------------------------
# Top-level outputs: BAO fits + derived tables/figures.
# -----------------------------------------------------------------------------
outputs:

  # Recipes reference sub-analysis outputs directly via dot-notation
  # (e.g. `inputs: [clustering.xi_pre_recon_lrg1]`) -- no root-level aliases
  # needed. Prism + astra resolve qualified sub-analysis outputs natively.

  # --- Chains: 4 fits (pre/post × iso_ap/perp_par) per 2D tracer ------------
  # BGS (1D-only: monopole-only fit, qAP fixed to 1; basis "iso")
  - id: bao_fit_pre_iso_bgs
    type: data
    description: "BGS pre-recon chain, 1D monopole fit in alpha_iso (qAP fixed)."
    decisions: [broadband, damping_prior, fit_range, ells, damping_centers, template_cosmology, smoothing_radius, fog_placement, dewiggling_method, dilate_model_component, fitting_method]
    inputs: [clustering.xi_pre_recon_bgs]
    recipe:
      command: >-
        python -u scripts/fit_bao_pre.py --output {output} --tracer bgs --basis iso
        --broadband {decisions.broadband} --damping_prior {decisions.damping_prior}
        --fit_range {decisions.fit_range} --ells {decisions.ells}
        --damping_centers {decisions.damping_centers}
        --template_cosmology {decisions.template_cosmology}
        --smoothing_radius {decisions.smoothing_radius}
        --fog_placement {decisions.fog_placement}
        --dewiggling_method {decisions.dewiggling_method}
        --dilate_model_component {decisions.dilate_model_component}
        --fitting_method {decisions.fitting_method}
      resources: { cpus: 16, memory: "32GB", time_limit: "1h" }

  - id: bao_fit_post_iso_bgs
    type: data
    description: "BGS post-recon chain, 1D monopole fit in alpha_iso (qAP fixed)."
    decisions: [broadband, damping_prior, fit_range, ells, damping_centers, template_cosmology, smoothing_radius, fog_placement, dewiggling_method, dilate_model_component, fitting_method]
    inputs: [clustering.xi_post_recon_bgs]
    recipe:
      command: >-
        python -u scripts/fit_bao_post.py --output {output} --tracer bgs --basis iso
        --broadband {decisions.broadband} --damping_prior {decisions.damping_prior}
        --fit_range {decisions.fit_range} --ells {decisions.ells}
        --damping_centers {decisions.damping_centers}
        --template_cosmology {decisions.template_cosmology}
        --smoothing_radius {decisions.smoothing_radius}
        --fog_placement {decisions.fog_placement}
        --dewiggling_method {decisions.dewiggling_method}
        --dilate_model_component {decisions.dilate_model_component}
        --fitting_method {decisions.fitting_method}
      resources: { cpus: 16, memory: "32GB", time_limit: "1h" }

  # LRG1
  - id: bao_fit_pre_iso_ap_lrg1
    type: data
    description: "LRG1 pre-recon chain in alpha_iso / alpha_AP basis."
    decisions: [broadband, damping_prior, fit_range, ells, damping_centers, template_cosmology, smoothing_radius, fog_placement, dewiggling_method, dilate_model_component, fitting_method]
    inputs: [clustering.xi_pre_recon_lrg1]
    recipe:
      command: >-
        python -u scripts/fit_bao_pre.py --output {output} --tracer lrg1 --basis iso_ap
        --broadband {decisions.broadband} --damping_prior {decisions.damping_prior}
        --fit_range {decisions.fit_range} --ells {decisions.ells}
        --damping_centers {decisions.damping_centers}
        --template_cosmology {decisions.template_cosmology}
        --smoothing_radius {decisions.smoothing_radius}
        --fog_placement {decisions.fog_placement}
        --dewiggling_method {decisions.dewiggling_method}
        --dilate_model_component {decisions.dilate_model_component}
        --fitting_method {decisions.fitting_method}
      resources: { cpus: 16, memory: "32GB", time_limit: "1h" }

  - id: bao_fit_post_iso_ap_lrg1
    type: data
    description: "LRG1 post-recon chain in alpha_iso / alpha_AP basis."
    decisions: [broadband, damping_prior, fit_range, ells, damping_centers, template_cosmology, smoothing_radius, fog_placement, dewiggling_method, dilate_model_component, fitting_method]
    inputs: [clustering.xi_post_recon_lrg1]
    recipe:
      command: >-
        python -u scripts/fit_bao_post.py --output {output} --tracer lrg1 --basis iso_ap
        --broadband {decisions.broadband} --damping_prior {decisions.damping_prior}
        --fit_range {decisions.fit_range} --ells {decisions.ells}
        --damping_centers {decisions.damping_centers}
        --template_cosmology {decisions.template_cosmology}
        --smoothing_radius {decisions.smoothing_radius}
        --fog_placement {decisions.fog_placement}
        --dewiggling_method {decisions.dewiggling_method}
        --dilate_model_component {decisions.dilate_model_component}
