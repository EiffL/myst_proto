  - id: hubble_diagram_plot
    type: figure
    description: |
      BAO Hubble diagram of D_M/r_d, D_H/r_d, D_V/r_d, D_M/D_H ratios to
      fiducial Planck 2018-ΛCDM; DESI DR1 stars overlaid on prior surveys
      (6dFGS, WiggleZ, SDSS DR16, DES Y6).
    inputs: [bao_distance_table,
             bao_fit_post_iso_bgs,
             bao_fit_post_iso_ap_lrg1, bao_fit_post_iso_ap_lrg2,
             bao_fit_post_iso_ap_lrg3, bao_fit_post_iso_ap_lrg3_elg1,
             bao_fit_post_iso_elg1, bao_fit_post_iso_ap_elg2,
             bao_fit_post_iso_qso]
    recipe:
      command: python -u scripts/plot_hubble_diagram.py --output {output}

# -----------------------------------------------------------------------------
# Top-level decisions. `smoothing_radius` is shared with the reconstruction
# sub-analysis (inherited there via `from: ../smoothing_radius`). The rest
# drive the BAO-fit scripts.
# -----------------------------------------------------------------------------
decisions:

  covariance_source:
    label: "Covariance matrix source"
    tags: [bao_fit, method]
    rationale: |
      The ξ covariance for every BAO fit comes from RascalC
      (semi-analytic 4-point integral + jackknife shot-noise rescaling).
      RascalC is calibrated against the DESI fiducial reconstruction +
      clustering pipeline: IterativeFFT RecSym, Σ_sm=15, lin4 s-binning,
      WEIGHT*WEIGHT_FKP weights, and the specific random density used in
      the published runs. Choosing the published VAC cov therefore locks
      downstream recon + clustering decisions to the fiducial options;
      the `self_computed` alternative was considered
      (misharash/RascalC-scripts + Misha's RascalC C++ fork on NERSC)
      but is excluded as out of scope for this reproduction -- see
      `excluded_reason`.
    default: desi_vac
    options:
      desi_vac:
        label: "DESI DR1 published RascalC-rescaled (fiducial)"
        description: |
          Ingested from /global/cfs/cdirs/desi/users/mrash/RascalC/Y1/
          unblinded/v1.2/. One cov per tracer × pre/post state.
      self_computed:
        label: "Rerun RascalC from scratch"
        description: |
          Full RascalC pipeline (pair counting + 4-point integration +
          jackknife rescaling) against DR1 catalogs, per
          misharash/RascalC-scripts.
        excluded: true
        excluded_reason: |
          ~20 node-days of compute across all tracers × pre/post, plus
          a private `desi_y1_files` (cosmodesi/desi-y1-kp) dependency
          for filename resolution, and a version-drift issue (scripts
          target v1.5, published cov is v1.2). Not in scope for this
          reproduction. Choosing this option would also require
          unlocking non-fiducial recon + clustering decisions (not
          currently exposed as options).

  smoothing_radius:
    label: "Reconstruction Gaussian smoothing scale (BGS/LRG/ELG)"
    tags: [reconstruction, bao_fit, method]
    rationale: |
      Smoothing scale Sigma_sm applied to the density field before solving
      for the displacement, for the BGS / LRG / ELG parents.
      The BAO model's damping correction uses the same value, so recon and
      fit must agree -- that's why this lives at the root and recon inherits
      it. QSO has a distinct fiducial (sm30 vs sm15 here) and is
      parameterized separately via `smoothing_radius_qso`.
    default: sm15
    options:
      sm10:
        label: "10 Mpc/h"
        incompatible_with: [covariance_source.desi_vac]
      sm15: { label: "15 Mpc/h (fiducial)" }
      sm20:
        label: "20 Mpc/h"
        incompatible_with: [covariance_source.desi_vac]

  smoothing_radius_qso:
    label: "Reconstruction Gaussian smoothing scale (QSO only)"
    tags: [reconstruction, bao_fit, method]
    rationale: |
      QSO's fiducial reconstruction smoothing is 30 h⁻¹ Mpc (vs 15 h⁻¹ Mpc
      for BGS/LRG/ELG), reflecting the QSO sample's lower number density
      and larger coherence scale. The BAO model's damping template must
      match, so both the recon script and the fit scripts branch on
      `tracer.id == "qso"` to consume this decision rather than
      `smoothing_radius`. sm20 is the sensitivity-test alternative for QSO.
    default: sm30
    options:
      sm20:
        label: "20 Mpc/h (sensitivity)"
        incompatible_with: [covariance_source.desi_vac]
      sm30: { label: "30 Mpc/h (fiducial)" }

  broadband:
    label: "Broadband model"
    tags: [bao_fit, method]
    rationale: |
      Spline-based broadband (fiducial) vs polynomial-based (legacy form).
      They give consistent BAO scales; the small difference goes into the
      systematic error budget.
    default: spline
    options:
      spline:
        label: "Spline (power, fiducial)"
        description: "desilike broadband='power'."
        insights: [spline_broadband_fiducial]
      polynomial:
        label: "Polynomial"
        description: "desilike broadband='poly' (ξ: Σ a_ℓ,n s^-n)."

  damping_prior:
    label: "BAO damping parameter prior"
    tags: [bao_fit, priors]
    rationale: |
      Gaussian priors on Σ_perp, Σ_par, Σ_s centered at fiducial values.
      Gaussian is more robust than flat priors, but results are consistent
      either way.
    default: gaussian
    options:
      gaussian:
        label: "Gaussian (fiducial)"
        description: "Normal priors at fiducial centres."
        insights:
          - damping_prior_gaussian_fiducial
          - damping_prior_width_justification
          - sigma_perp_parallel_formula
          - gaussian_lagrangian_displacement_model
          - bias_weak_effect_on_sigma
      flat:
        label: "Flat"
        description: "Uniform priors U[0, 20] for each damping parameter."
        insights: [damping_prior_gaussian_fiducial]

  fit_range:
    label: "Fit range in s"
    tags: [bao_fit, method]
    rationale: |
      Fiducial is s ∈ [48, 152] Mpc/h at 4 Mpc/h binning.
      Extend/narrow as sensitivity tests.
    default: default
    options:
      default:
        label: "[48, 152] Mpc/h  (fiducial)"
      wide:
        label: "[30, 180] Mpc/h"
      narrow:
        label: "[60, 130] Mpc/h"

  ells:
    label: "Multipoles fit (LRG only; 1D tracers override)"
    tags: [bao_fit, method]
    rationale: |
      LRG bins are fit with 2D (ℓ=0, 2). ELG1 / QSO are 1D-only regardless
      of this setting -- the tracer's `ells` in `scripts/tracers.py` caps
      the universe choice via an intersection in
      `bao_utils.resolve_settings`, so `twod` means "2D where supported".
    default: twod
    options:
      twod:
        label: "ℓ = 0, 2  (2D, LRG default)"
      oned:
        label: "ℓ = 0 only (1D)"

  damping_centers:
    label: "Damping prior central values"
    tags: [bao_fit, priors]
    rationale: |
      Fiducial Σ_perp, Σ_par, Σ_s per tracer × recon state.
      The per-tracer centers live in `scripts/tracers.py`; this decision is the
      multiplicative scaling applied to them. Variants widen / narrow the
      centers as a systematic test.
    default: fiducial
    options:
      fiducial:
        label: "Fiducial (per tracer)"
        description: "Unscaled fiducial centers for the tracer being fit."
        insights: [sigma_perp_parallel_formula, bias_weak_effect_on_sigma]
      wider:
        label: "Wider (+50%)"
        description: "Multiply fiducial centers by 1.5."
      narrower:
        label: "Narrower (-33%)"
        description: "Multiply fiducial centers by 0.67."

  fitting_method:
    label: "BAO fit method"
    tags: [bao_fit, method]
    rationale: |
      Fiducial reports posterior-based intervals for the combined-tracer
      rows and headline cosmological parameters — those come from emcee
      chains. Profiling (Minuit) gives a faster point estimate +
      parabolic errors, useful as a pipeline sanity check but not the
      fiducial for reported alphas.
    default: sampling
    options:
      sampling:
        label: "Sampling (emcee MCMC, fiducial)"
        description: "Full posterior via emcee; burn-in + thin; matches DESI Y1v1 chains."
      profiling:
        label: "Profiling (Minuit)"
        description: "MLE + Hessian intervals; fast sanity check."

  template_cosmology:
    label: "BAO template cosmology"
    tags: [bao_fit, systematics]
    rationale: |
      AbacusSummit cosmologies used to test fiducial-cosmology systematics.
      c000 is Planck-2018 ΛCDM (fiducial).
    default: c000
    options:
      c000:
        label: "c000 -- Planck 2018 ΛCDM (fiducial)"
        insights:
          - planck2018_headline_parameters
          - planck2018_rdrag_precision
          - planck2018_neutrino_convention
          - planck2018_neff_constraint
      c001: { label: "c001 -- Low ω_c ΛCDM" }
      c002: { label: "c002 -- Thawing dark energy" }
      c003:
        label: "c003 -- N_eff = 3.70"
        insights: [planck2018_neff_constraint]
      c004: { label: "c004 -- σ_8 = 0.75 ΛCDM" }

  fog_placement:
    label: "FoG damping placement"
    tags: [bao_fit, systematics]
    rationale: |
      Σ_s multiplies the smooth (no-wiggle) component only; the legacy
      approach applied it to the full template, which introduces a
      degeneracy with the BAO damping. "smooth_only" is the fiducial,
      built into desilike's DampedBAOWigglesTracer... model;
      the "full_model" alternative is declared but not wired
      (would need a custom theory wrapper).
    default: smooth_only
    options:
      smooth_only:
        label: "Smooth-only (fiducial)"
        description: "Σ_s multiplies P_nw only; desilike default."
        insights: [fog_decoupled_from_wiggles_fiducial, fog_decoupling_breaks_degeneracy]
      full_model:
        label: "Full-model (legacy)"
        description: "Σ_s multiplies wiggle + smooth; not wired, raises NotImplementedError."
        insights: [fog_placement_systematic_size]

  dewiggling_method:
    label: "Wiggle / no-wiggle split"
    tags: [bao_fit, systematics]
    rationale: |
      Fiducial uses the peak-average method of Brieden, Gil-Marín & Verde
      2022 to split P_linear into wiggle + smooth components.
      Eisenstein-Hu 1998 and Savitzky-Golay log-space filters are the
      historical alternatives. The systematic budget assigns < 0.02% α_iso
      / < 0.09% α_AP to this choice. Only the fiducial is wired.
    default: peak_average
    options:
      peak_average:
        label: "Peak-average (Brieden+2022, fiducial)"
        description: "desilike default for BAOPowerSpectrumTemplate."
        insights: [wallisch_dewiggling_fiducial]
      eisenstein_hu:
        label: "Eisenstein-Hu 1998"
        description: "Legacy analytic fit; not wired."
        insights: [dewiggling_method_systematic_size]
      savgol:
        label: "Savitzky-Golay (log-space)"
        description: "Polynomial smoother; not wired."
        insights: [dewiggling_method_systematic_size]

  dilate_model_component:
    label: "Component that α dilates"
    tags: [bao_fit, systematics]
    rationale: |
      The α_iso / α_AP rescaling is applied to the wiggle component only;
      the smooth P_nw is evaluated at observed coordinates without dilation.
      Dilating the full template is the alternative; the systematic budget
      assigns < 0.02% α_iso / < 0.09% α_AP to this choice. Only the
      fiducial is wired.
    default: wiggle_only
    options:
      wiggle_only:
        label: "Wiggle-only (fiducial)"
        description: "α rescales P_w; P_nw at observed coords. desilike default."
        insights: [dilate_wiggles_only_fiducial]
      full_template:
        label: "Full-template"
        description: "α rescales wiggle + smooth; not wired, raises NotImplementedError."
        insights: [dilate_wiggles_only_systematic_size]

  systematic_error_treatment:
    label: "Reported error includes modelling systematic"
    tags: [bao_fit, method]
    rationale: |
      Combined modelling systematic (0.1% α_iso, 0.2% α_AP, conservatively
      0.2% on α_⊥ / α_∥) added in quadrature to the reported σ. Consumed
      only by make_alpha_table.py -- the MCMC chains themselves are
      untouched, so both options can be produced from the same fits by
      re-running the table step. The stat-only σ is always kept as a
      companion column (`alpha{1,2}_std_stat`).
    default: include
    options:
      include:
        label: "Include modelling budget (headline)"
        description: "σ_reported = hypot(σ_stat, frac·α)."
        insights:
          - combined_systematic_budget
          - fog_placement_systematic_size
          - dewiggling_method_systematic_size
          - dilate_wiggles_only_systematic_size
      statistical_only:
        label: "Statistical only"
        description: "σ_reported = σ_stat; tests raw constraining power."

# -----------------------------------------------------------------------------
# Prior insights -- verified quote evidence extracted from the referenced
# papers. Each insight is linked to decision options via
# `options.<opt>.insights: [id]`.
# -----------------------------------------------------------------------------
prior_insights:

  # ==== Chen et al. 2024 (arXiv:2402.14070) -- DESI companion BAO modelling paper ====
  fog_decoupled_from_wiggles_fiducial:
    id: fog_decoupled_from_wiggles_fiducial
    claim: "The fiducial DESI choice applies the Fingers-of-God (Σ_s) damping only to the smooth model component and not to the BAO wiggle component; previous models applied FoG to both, and the fiducial decoupling makes BAO damping interpretation simpler."
    created_at: "2026-04-23T12:00:00"
    evidence:
      - id: ev1
        doi: "10.48550/arXiv.2402.14070"
        version: 2
        quote:
          exact: "We apply the Finger-of-God damping to only the smooth model components, allowing for no interaction with the BAO wiggles. This makes interpreting the impact of the BAO damping parameters simpler. Previous models applied the FoG term equally to both the wiggle and no-wiggle components."
          prefix: "following our fiducial fitting methodology."
          suffix: "(v) The DESI BAO template is constructed"
        location:
          page: 22

  fog_decoupling_breaks_degeneracy:
    id: fog_decoupling_breaks_degeneracy
    claim: "Including the FoG damping only in the smooth component removes a clear degeneracy between the BAO (Σ_||) damping and the FoG (Σ_s) damping scales, making prior enforcement and convergence easier."
    created_at: "2026-04-23T12:00:00"
    evidence:
      - id: ev1
        doi: "10.48550/arXiv.2402.14070"
        version: 2
        quote:
          exact: "Including the FoG damping in only the smooth model component is preferable as it removes a clear degeneracy between the BAO and FoG damping scales."
          prefix: "priors on these parameters in our other fits."
          suffix: "either k_min or k_max."
        location:
          page: 18

  fog_placement_systematic_size:
    id: fog_placement_systematic_size
    claim: "Placing the FoG damping on the wiggle component in addition to the smooth component shifts α_AP by an average of 0.11% (a 2σ-detected systematic) and α_iso by ≤ 0.02%, motivating inclusion of this effect in the modelling systematic budget."
    created_at: "2026-04-23T12:00:00"
    evidence:
      - id: ev1
        doi: "10.48550/arXiv.2402.14070"
        version: 2
        quote:
          exact: "the largest average difference is ≤ 0.02% and 0.11% for αiso and αap respectively. Albeit small, this latter difference is detected with 2σ significance and so should be accounted for in our final systematic error budget."
          prefix: "or our new spline-based broadband model is used,"
          suffix: "That said, the largest difference"
        location:
          page: 18

  wallisch_dewiggling_fiducial:
    id: wallisch_dewiggling_fiducial
    claim: "The DESI fiducial BAO template is constructed using the Wallisch (2018) peak-averaging/dewiggling method; previous BOSS/eBOSS analyses used varying methods (Eisenstein-Hu, Kirkby, etc.)."
    created_at: "2026-04-23T12:00:00"
    evidence:
      - id: ev1
        doi: "10.48550/arXiv.2402.14070"
        version: 2
        quote:
          exact: "The DESI BAO template is constructed following the method of Wallisch (2018) Previous BOSS and eBOSS analyses have used varying methods for extracting the template"
          prefix: "no-wiggle components."
          suffix: "(i.e., Eisenstein &amp; Hu"
        location:
          page: 22

  dewiggling_method_systematic_size:
    id: dewiggling_method_systematic_size
    claim: "The choice of wiggle/no-wiggle split method (Eisenstein-Hu, Hinton+2017, Wallisch, Brieden+2022, Savitzky-Golay) introduces a maximum modelling systematic of only 0.02% on α_iso and 0.09% on α_AP under the fiducial fitting methodology, with no single method theoretically preferred."
    created_at: "2026-04-23T12:00:00"
    evidence:
      - id: ev1
        doi: "10.48550/arXiv.2402.14070"
        version: 2
        quote:
          exact: "Our tests do not point to a single correct choice, but we find a maximum systematic error associated with this choice of only 0.02% and 0.09% for αiso and αap respectively when following our fiducial fitting methodology."
          prefix: "Kirkby et al. 2013)."
          suffix: "(vi) We dilate only the BAO wiggles"
        location:
          page: 22

  dilate_wiggles_only_fiducial:
    id: dilate_wiggles_only_fiducial
    claim: "DESI fiducial practice dilates only the BAO wiggle component by α, not the full template; previous analyses dilated both smooth and wiggle components, and dilating only wiggles guarantees that α captures only BAO information."
    created_at: "2026-04-23T12:00:00"
    evidence:
      - id: ev1
        doi: "10.48550/arXiv.2402.14070"
        version: 2
        quote:
          exact: "We dilate only the BAO wiggles by the α’s. Previous analyses generally dilated both the smooth and wiggle components of the model. We believe the new method to be preferable as it guarantees only information from the BAO is captured."
          prefix: "fiducial fitting methodology."
          suffix: "Given the large amount of"
        location:
          page: 22

  dilate_wiggles_only_systematic_size:
    id: dilate_wiggles_only_systematic_size
    claim: "Whether the smooth component is dilated in addition to the wiggle component induces a modelling systematic of < 0.02% on α_iso and < 0.09% on α_AP."
    created_at: "2026-04-23T12:00:00"
    evidence:
      - id: ev1
        doi: "10.48550/arXiv.2402.14070"
        version: 2
        quote:
          exact: "we find that the choice of whether or not to dilate the smooth model component in addition to the wiggles results in a systematic error of < 0.02% (< 0.09%) for αiso (αap)."
          prefix: "looking at the distribution of differences in the BAO constraints,"
          suffix: "The largest individual differences"
        location:
          page: 20

  spline_broadband_fiducial:
    id: spline_broadband_fiducial
    claim: "DESI adopts a cubic-spline-based broadband model as fiducial, replacing the polynomial broadband used by previous (e)BOSS analyses, because the spline method has stronger theoretical motivation and is less arbitrary in its choice of free parameters."
    created_at: "2026-04-23T12:00:00"
    evidence:
      - id: ev1
        doi: "10.48550/arXiv.2402.14070"
        version: 2
        quote:
          exact: "We use the spline-based broadband model validated in §7.1. Previous analyses used polynomials (of slightly varying degrees and functional forms) to fit the broadband. We find the spline method has better theoretical motivation, and to be less arbitrary in its choice of free parameters."
          prefix: "can be applied optimally in the context of DESI."
          suffix: "For our default fitting of the monopole"
        location:
          page: 21

  damping_prior_gaussian_fiducial:
    id: damping_prior_gaussian_fiducial
    claim: "Tight Gaussian priors (width 1-2 h^-1 Mpc) on the BAO damping parameters centered on theory values are recommended; fully fixing them risks biases and flat priors can also bias α and weaken constraints on noisy data."
    created_at: "2026-04-23T12:00:00"
    evidence:
      - id: ev1
        doi: "10.48550/arXiv.2402.14070"
        version: 2
        quote:
          exact: "We recommend choosing the BAO damping parameters based on theoretical calculations and allowing these to vary within reasonably tight priors"
          prefix: "correlation function."
          suffix: "(1−2h−1 Mpc)."
        location:
          page: 22
      - id: ev2
        doi: "10.48550/arXiv.2402.14070"
        version: 2
        quote:
          exact: "We found that completely fixing the BAO damping has the potential to lead to biased α’s if the wrong values are chosen, while allowing them to vary freely can also cause bias, and generally weak constraints, in the case of noisy data."
          prefix: "priors adopted for our fiducial data analysis can be found in"
          suffix: "Accounting for shot-noise"
        location:
          page: 22

  damping_prior_width_justification:
    id: damping_prior_width_justification
    claim: "Biases of order 0.1% in α_iso and 0.2% in α_AP appear when the damping parameters are misspecified by more than ~2 h^-1 Mpc from their fiducial values, justifying Gaussian priors of width 1-2 h^-1 Mpc."
    created_at: "2026-04-23T12:00:00"
    evidence:
      - id: ev1
        doi: "10.48550/arXiv.2402.14070"
        version: 2
        quote:
          exact: "biases of order 0.1% and 0.2% for αiso and αap respectively occur when the Σ values are changed by more than ∼ 2h−1 Mpc from their fiducial values."
          prefix: "BAO damping Σ’s are increased significantly"
          suffix: "Similar trends have been identified"
        location:
          page: 17

  combined_systematic_budget:
    id: combined_systematic_budget
    claim: "Summing theory and modelling systematics in quadrature, the recommended combined systematic budget for DESI post-reconstruction BAO is 0.1% on α_iso and 0.2% on α_AP."
    created_at: "2026-04-23T12:00:00"
    evidence:
      - id: ev1
        doi: "10.48550/arXiv.2402.14070"
        version: 2
        quote:
          exact: "Combining our two prongs of investigation we find that the combined systematics in BAO fitting can be controlled, conservatively, to within 0.1% for αiso and 0.2% for αap."
          prefix: "to measurement noise."
          suffix: "We arrive at these numbers by summing"
        location:
          page: 23

  # ==== Seo & Eisenstein 2007 (arXiv:astro-ph/0701079) -- improved BAO forecasts ====
  sigma_perp_parallel_formula:
    id: sigma_perp_parallel_formula
    claim: "Σ⊥ and Σ∥ follow Σ⊥ = Σ0·G, Σ∥ = Σ0·G·(1+f) where Σ0 = 12.4 h^-1 Mpc for σ8 = 0.9 at z=0, scaling linearly with σ8 and redshift via the growth function -- the theoretical prediction that anchors the Gaussian prior centres."
    created_at: "2026-04-23T12:00:00"
    evidence:
      - id: ev1
        doi: "10.48550/arXiv.astro-ph/0701079"
        version: 2
        quote:
          exact: "The rms radial displacements across (Σ⊥) and along the line of sight (Σk) at this separation follow Σ⊥ = Σ0G and Σk = Σ0G(1 + f), where Σ0 = 12.4h−1 Mpc for a cosmology with σ8 = 0.9 at the present-day, f = d(ln G)/d(ln a) ∼ Ω0.6m , and G is the growth function while G is normalized to be G = 0.758 at z = 0 such that G(z) = (1 + z)−1 at high z."
          prefix: "galaxy bias does not have much effect on Lagrangian displacement."
          suffix: "Σ0 should be scaled proportionally to σ8."
        location:
          page: 4
    scope: "Theoretical prediction of BAO damping scales"

  gaussian_lagrangian_displacement_model:
    id: gaussian_lagrangian_displacement_model
    claim: "Nonlinear erasure of the BAO is modelled as convolution with a Gaussian Lagrangian-displacement distribution, which Fourier-transforms to the multiplicative exp(-k²Σ²/2) damping form used in BAO template fits."
    created_at: "2026-04-23T12:00:00"
    evidence:
      - id: ev1
        doi: "10.48550/arXiv.astro-ph/0701079"
        version: 2
        quote:
          exact: "A broadened peak will have the same power spectrum multiplied with an additional damping envelope set by the Fourier transformation of the broadened peak shape. For example, if the peak in the correlation function is broadened with a Gaussian function due to the Silk damping effect (Σs) and Lagrangian displacement distribution (Σnl), then the convolution in configuration space with the Gaussian function is Fourier-transformed to a multiplicative exponential factor in Fourier space."
          prefix: "the Fourier transformation of the peak takes the following form in the power spectrum:"
          suffix: "Pb(k)"
        location:
          page: 7

  bias_weak_effect_on_sigma:
    id: bias_weak_effect_on_sigma
    claim: "Because Lagrangian displacements are dominated by bulk flows, galaxy bias has only a small effect on Σ⊥/Σ∥: highly biased tracers increase Lagrangian variances only by small amounts. Supports tracer-common Σ priors with modest tracer-dependent offsets."
    created_at: "2026-04-23T12:00:00"
    evidence:
      - id: ev1
        doi: "10.48550/arXiv.astro-ph/0701079"
        version: 2
        quote:
          exact: "From Eisenstein et al. (2006), the Lagrangian displacement fields due to nonlinear growth and nonlinear redshift distortions at separation of 100h−1 Mpc can be approximated as an elliptical Gaussian function. Since most of the effect comes from the bulk flow, galaxy bias does not have much effect on Lagrangian displacement."
          prefix: "assumes linear redshift distortions (Kaiser 1987)."
          suffix: "The rms radial displacements"
        location:
          page: 4
      - id: ev2
        doi: "10.48550/arXiv.astro-ph/0701079"
        version: 2
        quote:
